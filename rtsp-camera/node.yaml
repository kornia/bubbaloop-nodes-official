name: rtsp-camera
version: "0.1.0"
type: rust
description: RTSP camera capture, publishes compressed H264 via Zenoh
author: Bubbaloop Team
build: pixi run build
command: ./target/release/rtsp_camera_node

capabilities:
  - sensor

requires:
  hardware:
    - network
    - camera
  software:
    - gstreamer
    - gst-plugins-base
    - gst-plugins-good
    - gst-rtsp-server
