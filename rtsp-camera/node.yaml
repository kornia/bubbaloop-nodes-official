name: rtsp-camera
version: "0.1.0"
type: rust
description: RTSP camera capture, publishes compressed H264 via Zenoh
author: Bubbaloop Team
build: pixi run build
command: ./target/release/rtsp_camera_node

capabilities:
  - sensor

requires:
  hardware:
    - network
    - camera
  software:
    - gstreamer
    - gst-plugins-base
    - gst-plugins-good
    - gst-rtsp-server

# Baked into the systemd unit at install time. The Rust binary loads
# pixi-installed GStreamer, but the NVIDIA Jetson accelerators
# (nvv4l2decoder, etc.) only live in the host plugin dir — list both so
# `hw_accel: nvidia` configs work without `pixi run` wrapping.
environment:
  GST_PLUGIN_PATH: /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/home/nvidia/bubbaloop-nodes-official/rtsp-camera/.pixi/envs/default/lib/gstreamer-1.0
