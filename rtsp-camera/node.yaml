name: rtsp-camera
version: "0.1.0"
type: rust
description: RTSP camera capture, publishes compressed H264 via Zenoh
author: Bubbaloop Team
build: pixi run build
command: ./target/release/rtsp_camera_node

capabilities:
  - sensor

publishes:
  - suffix: camera/{name}/compressed
    description: "H264 compressed video frames from RTSP stream"
    schema_type: "bubbaloop.camera.v1.CompressedImage"
    rate_hz: 30.0

commands:
  - name: set_framerate
    description: "Change the capture frame rate"
    params:
      fps: float                # 1.0–60.0

requires:
  hardware:
    - network
    - camera

  software:
    - gstreamer
    - gst-plugins-base
    - gst-plugins-good
    - gst-rtsp-server
