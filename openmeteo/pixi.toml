[workspace]
name = "openmeteo"
version = "0.2.0"
description = "Open-Meteo weather data publisher"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[tasks]
run = { cmd = "python main.py" }

[dependencies]
python = ">=3.11"
pip = "*"

[pypi-dependencies]
eclipse-zenoh = ">=1.0"
requests = ">=2.31"
pyyaml = ">=6.0"
bubbaloop-sdk = { path = "/home/nvidia/bubbaloop/python-sdk" }
