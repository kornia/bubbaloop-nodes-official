[workspace]
name = "network-monitor"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[tasks]
main = "python main.py"

[dependencies]
python = ">=3.11"
pip = "*"

[pypi-dependencies]
eclipse-zenoh = ">=1.0"
requests = ">=2.28"
pyyaml = ">=6.0"
bubbaloop-sdk = { git = "https://github.com/kornia/bubbaloop.git", branch = "feat/publisher-queryable-mirror", subdirectory = "python-sdk" }
