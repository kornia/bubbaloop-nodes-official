name: network-monitor
version: "0.2.0"
type: python
description: Network connectivity monitor (HTTP, DNS, ping health checks)
author: Bubbaloop Team

command: pixi run run

capabilities:
  - sensor

publishes:
  - suffix: network-monitor/status
    description: "Network connectivity status (HTTP, DNS, ping latency and health)"
    encoding: application/json
    rate_hz: 0.1

requires:
  hardware:
    - network
  software:
    - ping
    - Python 3.11+
