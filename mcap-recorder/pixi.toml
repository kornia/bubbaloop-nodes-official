[workspace]
name = "recorder-py"
version = "0.1.0"
description = "Records Zenoh CBOR/JSON traffic into chunked MCAP files"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]

[tasks]
main = "python main.py"
test = "python -m pytest tests/ -v"

[dependencies]
python = ">=3.11"
pip = "*"

[pypi-dependencies]
eclipse-zenoh = ">=1.0"
mcap = ">=1.2"
cbor2 = ">=5.5"
pyyaml = ">=6.0"
bubbaloop-sdk = { git = "https://github.com/kornia/bubbaloop.git", branch = "main", subdirectory = "python-sdk" }

[feature.dev.pypi-dependencies]
pytest = ">=8.0"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
