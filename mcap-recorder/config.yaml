# mcap-recorder boot config.
#
# Only one field lives here: `name`, the Zenoh prefix the recorder declares
# its `command` queryable under (must be known before any command can be
# received).
#
# All recording parameters — topic_patterns, output_dir, chunk_*,
# decode_timestamps — are passed per-session in the `start_recording`
# command. See README.md.
name: mcap-recorder
