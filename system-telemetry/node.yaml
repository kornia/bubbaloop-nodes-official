name: system-telemetry
version: "0.2.0"
type: python
description: System metrics publisher (CPU, memory, disk, network, load)
author: Bubbaloop Team

command:
  run: pixi run run -- -c {config}

capabilities:
  - sensor
  - telemetry

publishes:
  - suffix: system-telemetry/metrics
    description: "System metrics — CPU, memory, disk, network I/O, load average"
    encoding: application/json
    rate_hz: 1.0

requires:
  hardware: []
  software:
    - Python 3.11+
    - psutil
