[workspace]
name = "system-telemetry"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[tasks]
main = "python main.py"

[dependencies]
python = ">=3.11"
pip = "*"

[pypi-dependencies]
eclipse-zenoh = ">=1.0"
psutil = ">=5.9"
pyyaml = ">=6.0"
bubbaloop-sdk = { git = "https://github.com/kornia/bubbaloop.git", branch = "fix/local-topic-raw-frames", subdirectory = "python-sdk" }
