[workspace]
name = "oak-camera"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[tasks]
main = "python main.py"

[dependencies]
python = ">=3.10"
pip = "*"

[pypi-dependencies]
eclipse-zenoh = ">=1.0"
depthai = ">=3.0"
kornia-rs = ">=0.1.10"
pillow = ">=10.0"
numpy = ">=1.24"
cbor2 = ">=5.5"
bubbaloop-sdk = { git = "https://github.com/kornia/bubbaloop.git", branch = "main", subdirectory = "python-sdk" }
