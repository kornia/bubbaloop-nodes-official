name: oak-camera
version: "0.1.0"
type: python
description: OAK camera publisher (RGB raw SHM + compressed JPEG; optional depth-at-bbox queryable)
author: Bubbaloop Team

command: pixi run main

capabilities:
  - sensor

requires:
  hardware:
    - OAK camera (USB, Movidius MyriadX, vendor 03e7)
  software:
    - Python 3.10+
    - depthai 3.x
    - Linux udev rule granting 0666 on vendor 03e7
