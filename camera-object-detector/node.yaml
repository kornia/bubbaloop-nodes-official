name: camera-object-detector
version: 0.2.0
type: python
description: Object detection using YOLO11 on camera raw frames via Zenoh SHM
author: Bubbaloop Team

command: pixi run main

capabilities:
  - processor

subscribes:
  - suffix: "{name}/raw"
    description: Raw RGBA frames from an rtsp-camera node (SHM, local)
    encoding: application/protobuf

publishes:
  - suffix: "{name}/detections"
    description: YOLO11 object detections with bounding boxes and confidence scores
    encoding: application/json
    rate_hz: 1.0

requires:
  hardware:
    - NVIDIA GPU with CUDA support (Jetson or desktop)
  software:
    - Python 3.10+
    - PyTorch with CUDA
